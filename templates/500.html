{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur serveur | QoS Ticketing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    .error-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark, #1a1d2e);
      padding: 2rem;
    }
    .error-card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: #dc3545;
      letter-spacing: -4px;
    }
    .error-icon {
      font-size: 3rem;
      color: #dc3545;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="error-layout">
  <div class="error-card">
    <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <div class="error-code">500</div>
    <h2 class="fw-700 mt-2 mb-1">Erreur serveur</h2>
    <p class="text-muted mb-4">
      Une erreur interne s'est produite. Notre équipe a été notifiée.<br>
      Veuillez réessayer dans quelques instants.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="/" class="btn btn-primary fw-600">
        <i class="bi bi-house me-2"></i>Accueil
      </a>
      <button onclick="location.reload()" class="btn btn-outline-secondary fw-600">
        <i class="bi bi-arrow-clockwise me-2"></i>Réessayer
      </button>
    </div>
    <div class="alert alert-light border mt-4 text-start small text-muted">
      <i class="bi bi-info-circle me-2"></i>
      Si le problème persiste, contactez l'administrateur système.
    </div>
    <p class="text-muted small mt-2 mb-0">&copy; {% now "Y" %} QoS Ticketing — OMCM</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
