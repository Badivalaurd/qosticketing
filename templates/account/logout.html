{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Déconnexion | QoS Ticketing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-layout">
  <div class="auth-card text-center">
    <div class="auth-logo mb-3"><i class="bi bi-box-arrow-left"></i></div>
    <h3>Déconnexion</h3>
    <p class="text-muted">Êtes-vous sûr de vouloir vous déconnecter ?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger w-100 mb-2">Se déconnecter</button>
    </form>
    <a href="{% url 'dashboard:home' %}" class="btn btn-outline-secondary w-100">Annuler</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
