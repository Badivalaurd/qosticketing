{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe modifié | QoS Ticketing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo text-success">
      <i class="bi bi-shield-check-fill"></i>
    </div>
    <h2 class="text-center mb-1 fw-700">Mot de passe modifié !</h2>
    <p class="text-center text-muted small mb-4">
      Votre mot de passe a bien été réinitialisé. Vous pouvez maintenant vous connecter.
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-primary w-100 fw-600">
      <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
    </a>

    <div class="text-center mt-4 small text-muted">
      &copy; {% now "Y" %} QoS Ticketing — Gestion des tickets et incidents
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
