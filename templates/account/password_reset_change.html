{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe | QoS Ticketing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-ticket-detailed-fill"></i>
    </div>
    <h2 class="text-center mb-1 fw-700">Nouveau mot de passe</h2>
    <p class="text-center text-muted small mb-4">Choisissez un nouveau mot de passe pour votre compte.</p>

    {% if errors %}
    <div class="alert alert-danger py-2">
      <ul class="mb-0 ps-3 small">
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label small fw-600">Nouveau mot de passe <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="password" class="form-control"
                 placeholder="Au moins 8 caractères" minlength="8" autofocus required>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye" id="togglePwdIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-600">Confirmer le mot de passe <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password2" id="password2" class="form-control"
                 placeholder="Répétez le mot de passe" minlength="8" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-600">
        <i class="bi bi-check-circle me-2"></i>Enregistrer le mot de passe
      </button>
    </form>

    <div class="text-center mt-4 small text-muted">
      &copy; {% now "Y" %} QoS Ticketing — Gestion des tickets et incidents
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('togglePwd').addEventListener('click', function () {
  const input = document.getElementById('password');
  const icon = document.getElementById('togglePwdIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
});
</script>
</body>
</html>
