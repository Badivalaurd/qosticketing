{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Direction{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-building me-2 text-orange"></i>{% if object %}Modifier{% else %}Nouvelle direction{% endif %}</h1>
</div>
<div class="row"><div class="col-lg-6">
  <div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}{% crispy form %}</form>
  </div></div>
</div></div>
{% endblock %}
