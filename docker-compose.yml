version: '3.9'

# ---------------------------------------------------------------------------
# Mode DESKTOP TEST : seul le service `postgres` est nécessaire.
# Lancer avec : docker compose up postgres
# La BD est accessible sur localhost:5432 pour tous les postes du réseau local.
# ---------------------------------------------------------------------------
services:
  postgres:
    image: postgres:16-alpine
    container_name: qos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qos_ticketing
      POSTGRES_USER: qos_user
      POSTGRES_PASSWORD: qos_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qos_user -d qos_ticketing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Services legacy (déploiement PythonAnywhere) — non utilisés en mode desktop
  redis:
    image: redis:7-alpine
    container_name: qos_redis
    ports:
      - "6379:6379"
    profiles:
      - server

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=qos_ticketing
      - DB_USER=qos_user
      - DB_PASSWORD=qos_secret_2026
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - server

volumes:
  postgres_data:
  media_data:
